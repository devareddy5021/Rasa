# ============================================================
# RASA NLU Training Data
# ============================================================
version: "3.1"

nlu:

  # ── GREET ──────────────────────────────────────────────
  - intent: greet
    examples: |
      - hi
      - hello
      - hey
      - good morning
      - good evening
      - greetings
      - hi there
      - what's up
      - howdy

  # ── GOODBYE ────────────────────────────────────────────
  - intent: goodbye
    examples: |
      - bye
      - goodbye
      - exit
      - quit
      - close
      - stop
      - end session
      - see you later
      - I'm done

  # ── HELP ───────────────────────────────────────────────
  - intent: help
    examples: |
      - help
      - what can you do
      - show menu
      - options
      - commands
      - what are your features
      - how do I use this

  # ── SHOW STUDENTS ──────────────────────────────────────
  - intent: show_students
    examples: |
      - show students
      - list students
      - view all students
      - display students
      - get students
      - who are the students
      - show me all students
      - students list
      - fetch students
      - all students

  # ── SHOW COURSES ───────────────────────────────────────
  - intent: show_courses
    examples: |
      - show courses
      - list courses
      - view all courses
      - display courses
      - get courses
      - what courses are available
      - show me all courses
      - courses list
      - fetch courses
      - all courses

  # ── ADD STUDENT ────────────────────────────────────────
  - intent: add_student
    examples: |
      - add student
      - new student
      - register student
      - create student
      - add a new student
      - I want to add a student
      - register a new student
      - insert student
      - create new student record

  # ── ADD COURSE ─────────────────────────────────────────
  - intent: add_course
    examples: |
      - add course
      - new course
      - create course
      - register course
      - add a new course
      - I want to add a course
      - insert course
      - create new course
      - new subject

  # ── ENROLL STUDENT ─────────────────────────────────────
  - intent: enroll_student
    examples: |
      - enroll student
      - add student to course
      - assign course to student
      - register student in course
      - enroll in course
      - assign student to course
      - student course enrollment
      - sign up student for course
      - add to course

